<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberRank — Question</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" type="image/png" href="https://chat.openai.com/sandbox/mnt/data/favicon_32x32.png" />
  </head>
  <body data-page="question">
    <header class="topbar">
      <a href="/index.html" class="brand-mini" id="go-home"><span class="brand-dot"></span>CyberRank</a>
      <div></div>
      <div class="nav">
        <button class="link-btn" id="nav-login">Login</button>
        <button class="link-btn" id="nav-signup">Sign Up</button>
        <div class="dropdown user-info-dropdown" id="user-info-dropdown" style="display:none;">
          <button class="link-btn" id="user-info-btn" type="button">Info</button>
          <div class="dropdown-panel" id="user-info-panel">
            <div class="user-info-card">
              <div class="avatar-wrap info">
                <img
                  id="info-photo"
                  class="avatar"
                  alt="User avatar"
                  src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96' viewBox='0 0 24 24' fill='none'><circle cx='12' cy='8' r='4' stroke='%23aab1c9' stroke-width='1.5'/><path d='M4 20c2.2-3 5-4.5 8-4.5s5.8 1.5 8 4.5' stroke='%23aab1c9' stroke-width='1.5' stroke-linecap='round'/></svg>'
                  data-default="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96' viewBox='0 0 24 24' fill='none'><circle cx='12' cy='8' r='4' stroke='%23aab1c9' stroke-width='1.5'/><path d='M4 20c2.2-3 5-4.5 8-4.5s5.8 1.5 8 4.5' stroke='%23aab1c9' stroke-width='1.5' stroke-linecap='round'/></svg>'"
                />
              </div>
              <div class="info-box">
                <div class="info-title">Full Name:</div>
                <div class="info-value" id="info-fullname">—</div>
                <div class="info-title">Email:</div>
                <div class="info-value" id="info-email">—</div>
              </div>
              <div class="info-links">
                <a class="link-btn" href="/profile.html">Profile</a>
              </div>
            </div>
          </div>
        </div>
        <div class="dropdown" id="settings-dd">
          <button class="link-btn" id="settings-btn" type="button">Settings</button>
          <div class="dropdown-panel" style="max-width: 320px;">
            <div style="display:flex; flex-direction:column; align-items:flex-start; gap:10px;">
              <label style="color:var(--muted);font-size:13px;">Theme:</label>
              <div style="display:grid;gap:8px; grid-template-columns:1fr 1fr; width:100%;">
                <button class="btn" data-theme-choice="night" id="dark-mode-btn-settings">Dark Mode</button>
                <button class="btn" data-theme-choice="day" id="light-mode-btn-settings">Light Mode</button>
              </div>
            </div>
            <div style="height:12px;"></div>
            <a class="link-btn" href="/about.html" id="nav-about-link">About</a>
          </div>
        </div>
      </div>
    </header>

    <main class="question-layout">
      <div class="question-timer" id="timer">00:00</div>
      <section class="question-card card">
        <div id="question-text" class="question-text">Loading question…</div>
        <div class="question-actions">
          <button class="btn primary" id="btn-next">Next</button>
          <button class="btn" id="btn-skip">Skip</button>
        </div>
        <div id="ai-feedback" class="ai-feedback"></div>
      </section>
    </main>

    <script src="./js/app.js"></script>
    <script type="module" src="./js/navAuth.js"></script>
    <script>
      (function(){
        const qs = new URLSearchParams(location.search);
        const quiz = qs.get('quiz') || '1';
        const qNum = Number(qs.get('q') || '1');

        const QUESTIONS = {
          '1': [
            { text: 'What does CIA triad stand for?', correct: 'Confidentiality, Integrity, Availability' },
            { text: 'Which protocol secures web traffic?', correct: 'HTTPS' },
            { text: 'What is phishing?', correct: 'Social engineering attempt' }
          ],
          '2': [
            { text: 'Port for HTTP?', correct: '80' },
            { text: 'SQL injection affects which layer?', correct: 'Application' },
            { text: 'One strong password trait?', correct: 'Length' }
          ],
          '3': [
            { text: 'What is MFA?', correct: 'Multi-factor authentication' },
            { text: 'Firewall purpose?', correct: 'Traffic filtering' },
            { text: 'TLS provides?', correct: 'Encryption' }
          ]
        };

        const question = (QUESTIONS[quiz] || [])[qNum - 1];
        const elQ = document.getElementById('question-text');
        const elF = document.getElementById('ai-feedback');
        const elT = document.getElementById('timer');
        const btnNext = document.getElementById('btn-next');
        const btnSkip = document.getElementById('btn-skip');
        if (!question) {
          elQ.textContent = 'No more questions in this quiz.';
          btnNext.disabled = true; btnSkip.disabled = true;
          return;
        }
        elQ.textContent = question.text;

        // Simple timer (mm:ss)
        let start = Date.now(), tId;
        function tick(){
          const s = Math.floor((Date.now() - start)/1000);
          const mm = String(Math.floor(s/60)).padStart(2,'0');
          const ss = String(s%60).padStart(2,'0');
          elT.textContent = mm + ':' + ss;
        }
        tId = setInterval(tick, 1000); tick();

        function saveAnswer(status){
          clearInterval(tId);
          const elapsedMs = Date.now() - start;
          const key = 'cr_answers_' + quiz;
          let arr = [];
          try { arr = JSON.parse(localStorage.getItem(key) || '[]'); } catch {}
          arr.push({ q: qNum, status, ms: elapsedMs });
          localStorage.setItem(key, JSON.stringify(arr));
          return { elapsedMs };
        }

        async function fakeAI(isCorrect){
          // Placeholder integration — replace with real endpoint call
          // Example: const res = await fetch('/api/ai', { method:'POST', body: JSON.stringify({ isCorrect, ... }) })
          await new Promise(r => setTimeout(r, 350));
          if (isCorrect) return { type: 'summary', text: 'Good job! You identified the core concept correctly.' };
          return { type: 'hint', text: 'Think about the security property this protects.' };
        }

        function goNext(){
          const base = location.pathname.replace(/[^/]+$/, '');
          const next = qNum + 1;
          location.href = base + 'question.html?quiz=' + encodeURIComponent(quiz) + '&q=' + next;
        }

        btnNext.addEventListener('click', async () => {
          const { elapsedMs } = saveAnswer('answered');
          const ai = await fakeAI(true);
          elF.textContent = (ai && ai.text) ? ai.text : '';
          setTimeout(goNext, 600);
        });
        btnSkip.addEventListener('click', async () => {
          const { elapsedMs } = saveAnswer('skipped');
          const ai = await fakeAI(false);
          elF.textContent = (ai && ai.text) ? ai.text : '';
          setTimeout(goNext, 600);
        });
      })();
    </script>
  </body>
</html>
