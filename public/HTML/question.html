<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberRank — السؤال</title>
    <!-- خط Inter الحديث -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- ملف الأنماط الرئيسي -->
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-theme="colors" data-page="question">
    <!-- شريط التنقل العلوي -->
    <header class="topbar">
      <!-- اسم المشروع على اليسار -->
      <a href="#" class="brand-mini" id="go-home">
        <span class="brand-dot"></span>
        CyberRank
      </a>
      <div></div>
      <!-- أزرار التنقل على اليمين -->
      <div class="nav">
        <!-- زر تسجيل الدخول/الخروج -->
        <button class="link-btn" id="nav-login">Login</button>
        <button class="link-btn" id="nav-signup">Sign Up</button>
        <button class="link-btn" id="nav-about">About</button>
        <!-- أيقونة معلومات المستخدم -->
        <div class="user-info-dropdown" id="user-info-dropdown" style="display: none;">
          <button class="icon-btn" id="user-info-btn" title="User Information">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"></circle>
              <circle cx="12" cy="9" r="3" stroke="currentColor" stroke-width="1.5"></circle>
              <path d="M6 19c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.5"></path>
            </svg>
            Info
          </button>
          <div class="dropdown-panel" id="user-info-panel">
            <div class="info-box">
              <div class="info-title">اسم المستخدم:</div>
              <div class="info-username" id="info-username">—</div>
              <div class="info-title" style="margin-top: 8px;">البريد الإلكتروني:</div>
              <div class="info-email" id="info-email">—</div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- خلفية متحركة -->
    <div class="background">
      <div class="bg-gradient"></div>
      <div class="bg-blobs">
        <span class="blob b1"></span>
        <span class="blob b2"></span>
        <span class="blob b3"></span>
      </div>
      <div class="bg-grid"></div>
    </div>

    <!-- قسم السؤال الرئيسي -->
    <main class="question-container">
      <section class="question-section">
        <!-- المؤقت في الأعلى اليمين -->
        <div class="question-header">
          <div class="timer-box" id="question-timer">
            1:00
          </div>
        </div>
        
        <!-- بطاقة السؤال -->
        <div class="question-card">
          <h1 class="question-title">السؤال</h1>
          <p class="question-text" id="question-text">
            ما هو أفضل ممارسة لأمان كلمة المرور؟
          </p>
          
          <!-- خيارات الإجابة (يمكن إضافتها لاحقاً) -->
          <div class="question-options" id="question-options">
            <!-- سيتم إضافة الخيارات ديناميكياً -->
          </div>
          
          <!-- أزرار التحكم -->
          <div class="question-actions">
            <button class="btn primary" id="question-next">Next</button>
            <button class="btn ghost" id="question-skip">Skip</button>
          </div>
        </div>
      </section>
    </main>

    <!-- ملف JavaScript الرئيسي -->
    <script src="/js/app.js"></script>
  </body>
</html>
