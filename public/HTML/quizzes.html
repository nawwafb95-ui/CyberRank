<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberRank — الاختبارات</title>
    <!-- خط Inter الحديث -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- ملف الأنماط الرئيسي -->
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-theme="colors" data-page="quizzes">
    <!-- شريط التنقل العلوي -->
    <header class="topbar">
      <!-- اسم المشروع على اليسار -->
      <a href="#" class="brand-mini" id="go-home">
        <span class="brand-dot"></span>
        CyberRank
      </a>
      <div></div>
      <!-- أزرار التنقل على اليمين -->
      <div class="nav">
        <!-- زر تسجيل الدخول/الخروج -->
        <button class="link-btn" id="nav-login">Login</button>
        <button class="link-btn" id="nav-signup">Sign Up</button>
        <button class="link-btn" id="nav-about">About</button>
        <!-- أيقونة معلومات المستخدم -->
        <div class="user-info-dropdown" id="user-info-dropdown" style="display: none;">
          <button class="icon-btn" id="user-info-btn" title="User Information">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"></circle>
              <circle cx="12" cy="9" r="3" stroke="currentColor" stroke-width="1.5"></circle>
              <path d="M6 19c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.5"></path>
            </svg>
            Info
          </button>
          <div class="dropdown-panel" id="user-info-panel">
            <div class="info-box">
              <div class="info-title">اسم المستخدم:</div>
              <div class="info-username" id="info-username">—</div>
              <div class="info-title" style="margin-top: 8px;">البريد الإلكتروني:</div>
              <div class="info-email" id="info-email">—</div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- خلفية متحركة -->
    <div class="background">
      <div class="bg-gradient"></div>
      <div class="bg-blobs">
        <span class="blob b1"></span>
        <span class="blob b2"></span>
        <span class="blob b3"></span>
      </div>
      <div class="bg-grid"></div>
    </div>

    <!-- قسم الاختبارات الرئيسي -->
    <main class="quizzes-container">
      <section class="quizzes-section">
        <div class="quizzes-card">
          <!-- عنوان الصفحة -->
          <h1 class="quizzes-title">اختر الاختبار</h1>
          <p class="quizzes-subtitle">اختر أحد الاختبارات التالية لبدء التحدي</p>
          
          <!-- أزرار الاختبارات -->
          <div class="quizzes-grid">
            <!-- اختبار 1 -->
            <button class="quiz-card" id="quiz-1">
              <div class="quiz-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                  <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <h2 class="quiz-title">Quiz 1</h2>
              <p class="quiz-description">أساسيات الأمن السيبراني</p>
            </button>
            
            <!-- اختبار 2 -->
            <button class="quiz-card" id="quiz-2">
              <div class="quiz-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <h2 class="quiz-title">Quiz 2</h2>
              <p class="quiz-description">أمان الشبكات والحماية</p>
            </button>
            
            <!-- اختبار 3 -->
            <button class="quiz-card" id="quiz-3">
              <div class="quiz-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <h2 class="quiz-title">Quiz 3</h2>
              <p class="quiz-description">التهديدات والدفاع المتقدم</p>
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- ملف JavaScript الرئيسي -->
    <script src="/js/app.js"></script>
  </body>
</html>
