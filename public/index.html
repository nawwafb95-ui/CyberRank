<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberRank — Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-page="home">
    <header class="topbar">
      <a href="#" class="brand-mini" id="go-home">
        <span class="brand-dot"></span>
        CyberRank
      </a>
      <div></div>
      <div class="nav">
        <div class="dropdown" id="about-dd">
          <button class="link-btn" id="about-btn">About</button>
          <div class="dropdown-panel" style="max-width:360px;">
            <div class="info-box">
              <strong>About CyberRank</strong>
              <div class="muted">
                CyberRank is an interactive cybersecurity training platform designed to help SOC analysts
                practice and improve their skills.
              </div>
            </div>
          </div>
        </div>
        <button class="link-btn" id="nav-quizzes">Quizzes</button>
        <button class="link-btn" id="nav-login">Login</button>
        <button class="link-btn" id="nav-signup">Sign Up</button>




      </div>
    </header>

    <div class="background">
      <div class="bg-gradient"></div>
      <div class="bg-blobs">
        <span class="blob b1"></span>
        <span class="blob b2"></span>
        <span class="blob b3"></span>
      </div>
      <div class="bg-grid"></div>
    </div>

    <section id="home" class="hero">
      <div class="hero-card">
        <h1 class="hero-title">Welcome to CyberRank</h1>
        <p class="hero-sub">Test your cybersecurity skills, track your level, and grow with tailored challenges.</p>
        <div class="hero-actions">
          <button class="cta" id="home-go-quizzes">Quizzes</button>
          <button class="ghost" id="home-go-login">Login</button>
          <button class="ghost" id="home-go-signup">Create an Account</button>
        </div>
      </div>
    </section>



    <script src="/js/app.js"></script>
  </body>
  </html>
