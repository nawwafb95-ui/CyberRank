<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberRank — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" type="image/png" href="https://chat.openai.com/sandbox/mnt/data/favicon_32x32.png" />
  </head>

  <body data-page="login">
    <header class="topbar">
      <a href="/index.html" class="brand-mini" id="go-home"><span class="brand-dot"></span>CyberRank</a>
      <div></div>
      <div class="nav">
        <button class="link-btn" id="nav-login">Login</button>
        <button class="link-btn" id="nav-signup">Sign Up</button>
        <div class="dropdown user-info-dropdown" id="user-info-dropdown" style="display:none;">
          <button class="link-btn" id="user-info-btn" type="button">Info</button>
          <div class="dropdown-panel" id="user-info-panel">
            <div class="user-info-card">
              <div class="avatar-wrap info">
                <img
                  id="info-photo"
                  class="avatar"
                  alt="User avatar"
                  src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96' viewBox='0 0 24 24' fill='none'><circle cx='12' cy='8' r='4' stroke='%23aab1c9' stroke-width='1.5'/><path d='M4 20c2.2-3 5-4.5 8-4.5s5.8 1.5 8 4.5' stroke='%23aab1c9' stroke-width='1.5' stroke-linecap='round'/></svg>'
                  data-default="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96' viewBox='0 0 24 24' fill='none'><circle cx='12' cy='8' r='4' stroke='%23aab1c9' stroke-width='1.5'/><path d='M4 20c2.2-3 5-4.5 8-4.5s5.8 1.5 8 4.5' stroke='%23aab1c9' stroke-width='1.5' stroke-linecap='round'/></svg>'"
                />
              </div>
              <div class="info-box">
                <div class="info-title">Full Name:</div>
                <div class="info-value" id="info-fullname">—</div>
                <div class="info-title">Email:</div>
                <div class="info-value" id="info-email">—</div>
              </div>
              <div class="info-links">
                <a class="link-btn" href="/profile.html">Profile</a>
              </div>
            </div>
          </div>
        </div>
        <div class="dropdown" id="settings-dd">
          <button class="link-btn" id="settings-btn" type="button">Settings</button>
          <div class="dropdown-panel" style="max-width: 320px;">
            <div style="display:flex; flex-direction:column; align-items:flex-start; gap:10px;">
              <label style="color:var(--muted);font-size:13px;">Theme:</label>
              <div style="display:grid;gap:8px; grid-template-columns:1fr 1fr; width:100%;">
                <button class="btn" data-theme-choice="night" id="dark-mode-btn-settings">Dark Mode</button>
                <button class="btn" data-theme-choice="day" id="light-mode-btn-settings">Light Mode</button>
              </div>
            </div>
            <div style="height:12px;"></div>
            <a class="link-btn" href="/about.html" id="nav-about-link">About</a>
          </div>
        </div>
      </div>
    </header>

    <main id="auth" class="auth-layout">
      <div class="brand">
        <h1 class="brand-title">CyberRank</h1>
        <p class="brand-subtitle">Welcome to CyberRank</p>
      </div>

      <section class="card">
        <div class="tabs" role="tablist" aria-label="Authentication tabs">
          <button class="tab active" role="tab" aria-selected="true">Login</button>
          <button class="tab" role="tab" aria-selected="false" onclick="window.location.href='./signup.html'">Sign Up</button>
        </div>

        <div class="panel" role="tabpanel">
          <form id="login-form" novalidate>
            <div class="field">
              <label for="login-username">Username</label>
              <input id="login-username" name="username" type="text" placeholder="e.g., CyberNinja1" autocomplete="username" required>
              <p class="error" data-error-for="login-username"></p>
            </div>
            <div class="field">
              <label for="login-password">Password</label>
              <div class="pw-wrap">
                <input id="login-password" name="password" type="password" placeholder="********" autocomplete="current-password" required>
                <button type="button" class="pw-toggle" data-target="login-password" aria-label="Show password">👁️</button>
              </div>
              <p class="error" data-error-for="login-password"></p>
            </div>
            <button type="submit" class="btn primary">Login</button>
            <!-- مكان رسالة الحالة/الخطأ -->
            <p id="auth-msg" class="error" style="margin-top:10px;"></p>
          </form>
        </div>

        <p class="switch-note">
          <span>Want to <a class="linklike" href="./signup.html">create an account</a>?</span>
        </p>
      </section>
    </main>

    <!-- سكربت الواجهة (ثيم/لغة/نَفجيشن فقط) -->
    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/navAuth.js"></script>

    <!-- سكربت اللوجن الحقيقي (Firebase + Username) -->
    <script type="module">
      console.log("[login] module start");

      import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
      import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
      import { firebaseConfig } from "./js/firebaseConfig.js";
      import { loginWithUsername, showMsg } from "./js/auth.js";

      const app  = getApps().length ? getApp() : initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db   = getFirestore(app);

      const form = document.getElementById("login-form");
      const uEl  = document.getElementById("login-username");
      const pEl  = document.getElementById("login-password");
      const msg  = document.getElementById("auth-msg");

      function setMsg(t){ if (msg) msg.textContent = t; }

      async function handleLogin(e){
        e?.preventDefault?.();
        try{  
          const username = (uEl?.value || "").trim();
          const pass     = pEl?.value || "";
          console.log("[login] submit", { usernameLen: username.length, hasPass: !!pass });

          if(!username || !pass){ setMsg("Please enter username & password."); return; }

          setMsg("Signing in…");
          await loginWithUsername(auth, db, username, pass); // يوجّه dashboard.html عند النجاح
        }catch(err){
          console.error("[login] error", err);
          showMsg(err);
        }
      }

      if(form && uEl && pEl){
        form.addEventListener("submit", handleLogin);
        // احتياط: اربط الزر كمان
        const btn = form.querySelector('button[type="submit"]');
        if(btn) btn.addEventListener("click", handleLogin);
        console.log("[login] handlers attached");
      }else{
        console.warn("[login] elements not found. Expected #login-form, #login-username, #login-password");
        setMsg("Internal error: form elements not found. Check IDs.");
      }
    </script>
  </body>
</html>
