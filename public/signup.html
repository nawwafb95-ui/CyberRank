<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberRank — Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- كان /css/styles.css → صار نسبي لأن root هو public -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <!-- مهم: data-page="signup" عشان app.js يفعّل منطق صفحة التسجيل -->
  <body data-page="signup">
    <header class="topbar">
      <!-- كان href="#" → صار ./index.html -->
      <a href="./index.html" class="brand-mini" id="go-home">
        <span class="brand-dot"></span>
        CyberRank
      </a>
      <div></div>
      <div class="nav">
        <button class="link-btn" id="nav-login">Login</button>
        <button class="link-btn" id="nav-signup">Sign Up</button>

        <div class="dropdown" id="lang-dd">
          <button class="icon-btn" id="lang-btn" title="Languages">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"></circle>
              <path
                d="M3 12h18M12 3c2.5 2.8 2.5 14.2 0 18M5 7c4 2.5 10 2.5 14 0M5 17c4-2.5 10-2.5 14 0"
                stroke="currentColor" stroke-width="1.2" opacity=".7">
              </path>
            </svg>
            Languages
          </button>
          <div class="dropdown-panel">
            <div class="translate">
              <label for="lang-top" style="color:var(--muted);font-size:13px;">Translate:</label>
              <select id="lang-top" aria-label="Select language">
                <option value="en-US" selected>English (US)</option>
                <option value="en-GB">English (UK)</option>
                <option value="ar">العربية</option>
                <option value="fr">Français</option>
              </select>
              <button id="apply-lang-top" class="btn">Apply</button>
            </div>
            <small style="display:block;color:var(--muted);margin-top:8px;">Default: English (US).</small>
          </div>
        </div>


      </div>
    </header>

    <div class="background">
      <div class="bg-gradient"></div>
      <div class="bg-blobs">
        <span class="blob b1"></span>
        <span class="blob b2"></span>
        <span class="blob b3"></span>
      </div>
      <div class="bg-grid"></div>
    </div>

    <main id="auth" class="auth-layout">
      <div class="brand">
        <h1 class="brand-title">CyberRank</h1>
        <p class="brand-subtitle">Welcome to CyberRank</p>
      </div>

      <section class="card">
        <div class="tabs" role="tablist" aria-label="Authentication tabs">
          <!-- كان /public/HTML/login.html → صار ./login.html -->
          <button class="tab" role="tab" aria-selected="false"
                  onclick="window.location.href='./login.html'">Login</button>
          <button class="tab active" role="tab" aria-selected="true">Sign Up</button>
        </div>

        <div class="panel" role="tabpanel">
          <form id="signup-form" novalidate>
          <div class="avatar-wrap" style="margin-bottom:10px;">
            <div class="upload-label">Profile Photo (optional)</div>
            <img id="signup-photo-preview" class="avatar-lg" alt="Profile photo preview"
                 src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96' viewBox='0 0 24 24' fill='none'><circle cx='12' cy='8' r='4' stroke='%23aab1c9' stroke-width='1.5'/><path d='M4 20c2.2-3 5-4.5 8-4.5s5.8 1.5 8 4.5' stroke='%23aab1c9' stroke-width='1.5' stroke-linecap='round'/></svg>">
            <input id="signup-photo" name="photo" type="file" accept="image/*" style="display:none">
            <label for="signup-photo" class="upload-btn">Choose Photo</label>
          </div>
            <div class="field">
              <label for="signup-username">Username</label>
              <input id="signup-username" name="username" type="text"
                     placeholder="Username (5+ chars, 1 uppercase, 1 number)" autocomplete="username" required>
              <p class="error" data-error-for="signup-username"></p>

            </div>

            <div class="field">
              <label for="signup-email">Email</label>
              <input id="signup-email" name="email" type="email"
                     placeholder="you@example.com" autocomplete="email" required>
              <p class="error" data-error-for="signup-email"></p>
            </div>

            <div class="field two-col">
              <div>
                <label for="signup-password">Password</label>
                <div class="pw-wrap">
                  <input id="signup-password" name="password" type="password"
                         placeholder="At least 8 characters" autocomplete="new-password" required>
                  <button type="button" class="pw-toggle" data-target="signup-password" aria-label="Show password">👁️</button>
                </div>
                <p class="error" data-error-for="signup-password"></p>
              </div>
              <div>
                <label for="signup-confirm">Confirm Password</label>
                <div class="pw-wrap">
                  <input id="signup-confirm" name="confirmPassword" type="password"
                         placeholder="Re-enter password" autocomplete="new-password" required>
                  <button type="button" class="pw-toggle" data-target="signup-confirm" aria-label="Show password">👁️</button>
                </div>
                <p class="error" data-error-for="signup-confirm"></p>
              </div>
            </div>

            <div class="field">
              <label>User Type</label>
              <div class="choices" role="radiogroup" aria-label="User Type">
                <label class="choice"><input type="radio" name="userType" value="employee" checked> Employee</label>
                <label class="choice"><input type="radio" name="userType" value="school"> School Student</label>
                <label class="choice"><input type="radio" name="userType" value="university"> University Student</label>
              </div>
              <p class="error" data-error-for="userType"></p>
            </div>

            <div class="field two-col">
              <div>
                <label for="signup-age">Age</label>
                <input id="signup-age" name="age" type="number" min="1" max="120"
                       placeholder="e.g., 21" required>
                <p class="error" data-error-for="signup-age"></p>
              </div>
              <div>
                <label for="signup-stage" id="stage-label">Stage/Level</label>
                <input id="signup-stage" name="stage" type="text"
                       placeholder="e.g., Junior" required>
                <p class="error" data-error-for="signup-stage"></p>
              </div>
            </div>

            

            <button type="submit" class="btn primary">Create Account</button>
          </form>
        </div>

        <p class="switch-note">
          <!-- كان /public/HTML/login.html → صار ./login.html -->
          <span>Want to <a class="linklike" href="./login.html">sign in</a>?</span>
        </p>
      </section>
    </main>

    <!-- كان /js/app.js → صار Module + مسار نسبي -->
    <script type="module" src="./js/app.js"></script>

    <p id="auth-msg" class="error" style="margin-top:10px;"></p>
    <p id="auth-msg" class="error" style="margin-top:10px;"></p>

    <script type="module">
      console.log("[signup] module start");
    
      import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
      import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
      import { firebaseConfig } from "./js/firebaseConfig.js";
      import { signupWithUsername, showMsg } from "./js/auth.js";
    
      // init once
      const app  = getApps().length ? getApp() : initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db   = getFirestore(app);
    
      // عناصر الصفحة (تأكّد IDs مطابقة)
      const form   = document.getElementById("signup-form");
      const uEl    = document.getElementById("signup-username");
      const eEl    = document.getElementById("signup-email");
      const pEl    = document.getElementById("signup-password");
      const cEl    = document.getElementById("signup-confirm");
      const ageEl  = document.getElementById("signup-age");
      const stgEl  = document.getElementById("signup-stage");
      const photoEl= document.getElementById("signup-photo");
      const photoPrev = document.getElementById("signup-photo-preview");
      const msg    = document.getElementById("auth-msg");
    
      function setMsg(t){ if (msg) msg.textContent = t; }
    
      async function handleSignup(e){
        e?.preventDefault?.();
        try{
          const username = (uEl?.value || "").trim();
          const email    = (eEl?.value || "").trim();
          const pass     = pEl?.value || "";
          const confirm  = cEl?.value || "";
          const age      = ageEl?.value ? Number(ageEl.value) : null;
          const stage    = (stgEl?.value || "").trim();
          const userType = (document.querySelector("input[name='userType']:checked")||{}).value;
          let photoData  = null;
          if (photoEl && photoEl.files && photoEl.files[0]) {
            photoData = await new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.readAsDataURL(photoEl.files[0]);
            });
          }
          if (photoPrev && photoData) { photoPrev.src = photoData; }

          // Immediate preview is also wired below
    
          console.log("[signup] submit", { ulen: username.length, hasEmail: !!email, hasPass: !!pass });
    
          if (!username) return setMsg("Please enter a username.");
          if (!email)    return setMsg("Please enter a valid email.");
          if (!pass)     return setMsg("Please enter a password.");
          if (pass !== confirm) return setMsg("Passwords do not match.");
    
          setMsg("Creating account…");
          await signupWithUsername(auth, db, {
            username, email, password: pass,
            profile: { age, stage, userType, photo: photoData }
          }); // يوجّه تلقائياً إلى ./dashboard.html
        }catch(err){
          console.error("[signup] error", err);
          showMsg(err); // يطبع الرسالة تحت الزر
        }
      }
    
      if(form && uEl && eEl && pEl && cEl){
        form.addEventListener("submit", handleSignup);
        // احتياط: اربط الزر أيضًا
        const btn = form.querySelector('button[type="submit"]');
        if (btn) btn.addEventListener("click", handleSignup);
        console.log("[signup] handlers attached");
      }else{
        console.warn("[signup] elements not found. Expected IDs missing");
        setMsg("Internal error: some form elements not found. Check IDs.");
      }
    </script>
    <script>
      (function(){
        const input = document.getElementById('signup-photo');
        const prev  = document.getElementById('signup-photo-preview');
        if (input && prev) {
          input.addEventListener('change', () => {
            const f = input.files && input.files[0];
            if (!f) return;
            const reader = new FileReader();
            reader.onload = () => { prev.src = reader.result; };
            reader.readAsDataURL(f);
          });
        }
      })();
    </script>
    
    
  </body>
</html>
